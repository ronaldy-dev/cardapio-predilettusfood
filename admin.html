<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel ADM - Altas Horas</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #ffcc00;
            --dark: #1a1a1a;
            --card: #262626;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border-left: 5px solid var(--primary);
        }

        .stat-card h3 { margin: 0; font-size: 0.9rem; color: #bbb; }
        .stat-card p { margin: 10px 0 0; font-size: 1.8rem; font-weight: bold; }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card);
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #333;
        }

        th { background-color: #333; color: var(--primary); }
        tr:hover { background: #333; }

        .btn-refresh {
            background: var(--primary);
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-refresh:hover { opacity: 0.8; }

        .badge {
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            background: #444;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🍔 Altas Horas ADM</h1>
        <button class="btn-refresh" onclick="buscarPedidos()">🔄 Atualizar</button>
    </header>

    <div class="stats">
        <div class="stat-card">
            <h3>Total de Pedidos</h3>
            <p id="stat-total-pedidos">0</p>
        </div>
        <div class="stat-card">
            <h3>Vendas Hoje</h3>
            <p id="stat-venda-total">R$ 0,00</p>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Hora</th>
                <th>Cliente</th>
                <th>Itens</th>
                <th>Entrega</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody id="tabela-pedidos">
            </tbody>
    </table>
</div>

<script>
    // --- CONFIGURAÇÃO DO SUPABASE ---
const supabaseUrl = 'https://jsyzlodjzhwyisyevddp.supabase.co'; // SEM o /rest/v1/
const supabaseKey = 'sb_publishable_a45fbJE_qc3agfilblrUjQ_QuZIMVIw';
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    async function buscarPedidos() {
        const btn = document.querySelector('.btn-refresh');
        btn.innerText = "Carregando...";

        const { data, error } = await _supabase
            .from('pedidos')
            .select('*')
            .order('criado_em', { ascending: false });

        if (error) {
            console.error('Erro:', error);
            alert("Erro ao buscar dados!");
            return;
        }

        renderizarTabela(data);
        atualizarStats(data);
        btn.innerText = "🔄 Atualizar";
    }

    function renderizarTabela(pedidos) {
        const tbody = document.getElementById('tabela-pedidos');
        tbody.innerHTML = '';

        pedidos.forEach(p => {
            const dataPedido = new Date(p.criado_em).toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
            
            tbody.innerHTML += `
                <tr>
                    <td>${dataPedido}</td>
                    <td><strong>${p.nome_cliente}</strong></td>
                    <td><small>${p.itens}</small></td>
                    <td><span class="badge">${p.metodo_entrega}</span></td>
                    <td style="color: #ffcc00; font-weight: bold">R$ ${parseFloat(p.total).toFixed(2)}</td>
                </tr>
            `;
        });
    }

    function atualizarStats(pedidos) {
        document.getElementById('stat-total-pedidos').innerText = pedidos.length;
        
        const somaTotal = pedidos.reduce((acc, p) => acc + parseFloat(p.total), 0);
        document.getElementById('stat-venda-total').innerText = `R$ ${somaTotal.toFixed(2)}`;
    }

    // Iniciar
    buscarPedidos();
</script>

</body>
</html>
