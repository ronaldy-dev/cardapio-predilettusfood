<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cardápio digital do Altas Horas. X-tudo, pizzas e bebidas. Peça pelo WhatsApp com entrega ou retirada.">
    <meta name="theme-color" content="#0a0a0a">

    <!-- Open Graph / Social -->
    <meta property="og:title" content="Altas Horas — Cardápio Digital">
    <meta property="og:description" content="X-tudo, pizzas e bebidas. Faça seu pedido pelo WhatsApp!">
    <meta property="og:image" content="">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <title>Altas Horas- Catálogo Digital</title>

    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="img/logo-lanche.jpg">
    <link rel="apple-touch-icon" href="img/logo-lanche.jpg">

    <!-- Preload do banner (LCP crítico) -->
    <link rel="preload" as="image" href="img/banner-1.jpeg">

    <!-- Font Awesome — não bloqueante -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="preload"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
          as="style"
          integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOtrVJQ=="
          crossorigin="anonymous"
          onload="this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet"
              href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
              integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOtrVJQ=="
              crossorigin="anonymous">
    </noscript>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css?=1.0.1">
</head>
<body>

    <!-- HEADER -->
    <header>
        <!-- alt vazio: o <h1> já nomeia a marca (BUG-HTML-16) -->
        <img src="img/logo-lanche.jpg" alt="" role="presentation" class="logo" width="90" height="90">
        <h1>Altas Horas</h1>
        <!-- Número clicável no celular (BUG-HTML-17) -->
        <p class="zap-header">
            <a href="https://wa.me/5568984044854" target="_blank" rel="noopener noreferrer"
               aria-label="Entrar em contato via WhatsApp">
                <i class="fab fa-whatsapp" aria-hidden="true"></i> (68) 984044854
            </a>
        </p>
    </header>

    <!-- INFORMAÇÕES -->
    <section class="info-container" aria-label="Informações do estabelecimento">
        <div class="info-grid">

            <div class="info-item">
                <div class="info-circle"><i class="fas fa-motorcycle" aria-hidden="true"></i></div>
                <div class="info-text">
                    <strong>Entrega</strong>
                    <span>Taxa fixa R$ 4,00</span>
                </div>
            </div>

            <div class="info-item">
                <div class="info-circle"><i class="fas fa-credit-card" aria-hidden="true"></i></div>
                <div class="info-text">
                    <strong>Pagamento</strong>
                    <span>Pix, Cartões e dinheiro</span>
                </div>
            </div>

            <div class="info-item">
                <div class="info-circle"><i class="fas fa-clock" aria-hidden="true"></i></div>
                <div class="info-text">
                    <strong>Horário</strong>
                    <span>18h às 22h</span>
                </div>
            </div>

            <div class="info-item">
                <div class="info-circle"><i class="fas fa-map-marker-alt" aria-hidden="true"></i></div>
                <div class="info-text">
                    <strong>Localização</strong>
                    <span>Rodrigues Alves</span>
                </div>
            </div>

        </div>
    </section>

    <!-- CATEGORIAS -->
    <nav class="categorias" aria-label="Filtro de categorias">
        <button class="active" data-categoria="todos" aria-pressed="true">Tudo</button>
        <button data-categoria="x-tudo" aria-pressed="false">X-tudo</button>
        <button data-categoria="pizza" aria-pressed="false">Pizzas</button>
        <button data-categoria="sorvete" aria-pressed="false">Açaí/Sorvetes</button>
        <button data-categoria="bebidas" aria-pressed="false">Bebidas</button>
    </nav>

    <!-- PRODUTOS -->
    <main id="lista-produtos">
        <noscript>
            <p style="text-align:center;padding:2rem;color:#b3b3b3;">
                Por favor, habilite o JavaScript para visualizar o cardápio.
            </p>
        </noscript>
    </main>

    <!-- CARRINHO FLUTUANTE — agora é <button> (BUG-HTML-09) -->
    <button id="carrinho-flutuante" style="display: none;" type="button" aria-label="Ver carrinho">
        <div id="resumo-carrinho">
            <span class="badge-itens" id="itens-carrinho">0</span>
            <span id="total-carrinho">R$ 0,00</span>
        </div>
        <span id="btn-finalizar">
            Ver Pedido <i class="fa fa-shopping-basket" aria-hidden="true"></i>
        </span>
    </button>

    <!-- MODAL -->
    <div id="modal-carrinho" class="modal"
         role="dialog"
         aria-modal="true"
         aria-labelledby="modal-titulo">
        <div class="modal-content">

            <h2 id="modal-titulo">Seus Pedidos</h2>

            <!-- LISTA DE ITENS -->
            <div id="lista-resumo"></div>

            <!-- MODO DE ENTREGA (BUG-UX-01 / BUG-H-2) -->
            <div class="entrega-container">
                <label for="modo-entrega" class="entrega-label">Tipo de pedido:</label>
                <select id="modo-entrega" class="entrega-select">
                    <option value="entrega">Entrega (+ R$ 4,00)</option>
                    <option value="retirada">Retirada no local</option>
                </select>
            </div>

            <!-- CAMPOS DE ENDEREÇO (BUG-UX-07) -->
           <div id="campos-cliente" class="campos-endereco">
    <input type="text" id="input-nome" class="input-endereco"
           placeholder="Seu nome completo"
           aria-label="Seu nome"
           required>
           
    <div id="campos-endereco" class="campos-endereco" style="display: block; width: 100%; padding: 0;">
        <input type="text" id="input-endereco" class="input-endereco"
               placeholder="Endereço completo (rua, número, bairro)"
               aria-label="Endereço para entrega"
               autocomplete="street-address">
        <input type="text" id="input-referencia" class="input-endereco"
               placeholder="Ponto de referência (opcional)"
               aria-label="Ponto de referência">
    </div>
</div>

            <!-- TOTAL -->
            <div class="total-container">
                <strong>Total:</strong>
                <span id="total-modal">R$ 0,00</span>
            </div>

            <!-- AÇÕES -->
            <div class="modal-actions">
                <button class="btn-close" id="btn-continuar" type="button">Adicionar mais</button>
                <button class="btn-finish" id="btn-whatsapp" type="button">
                    <i class="fab fa-whatsapp" aria-hidden="true"></i> Finalizar no WhatsApp
                </button>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- JS — defer garante execução após o HTML (BUG-HTML-15) -->
    <script src="script.js" defer></script>
</body>
</html>
